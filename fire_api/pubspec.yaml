name: fire_api
description: "A stripped down interface for firestore databases which allows both dart servers using `fire_api_dart` and flutter apps using `fire_api_flutter` to use the same api."
version: 1.7.4
repository: https://github.com/ArcaneArts/fire_api/tree/main/fire_api
environment:
  sdk: '>=3.0.0 <4.0.0'
dev_dependencies:
  artifact_gen: '>=1.3.10 <2.0.0'
  build_runner: ^2.10.0
  lints: ^6.0.0
  test: ^1.25.15
dependencies:
  artifact: '>=1.0.33 <2.0.0'
  fast_log: ">=1.0.7"
  rxdart: '>=0.27.7 <0.29.0'
